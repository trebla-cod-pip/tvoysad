# =============================================================================
# /etc/nginx/sites-available/tvoysad
# Скопируйте на сервер и замените /opt/tvoysad на реальный путь к проекту.
#
# Активация:
#   sudo ln -sf /etc/nginx/sites-available/tvoysad /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ── HTTP → HTTPS редирект ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name tlpn.shop www.tlpn.shop;
    return 301 https://$host$request_uri;
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name tlpn.shop www.tlpn.shop;

    ssl_certificate     /etc/letsencrypt/live/tlpn.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tlpn.shop/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 20M;

    # ── Статика Django ────────────────────────────────────────────────────────
    location /static/ {
        alias /opt/tvoysad/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ── Медиафайлы ────────────────────────────────────────────────────────────
    location /media/ {
        alias /opt/tvoysad/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Favicon ───────────────────────────────────────────────────────────────
    location = /favicon.ico {
        alias /opt/tvoysad/staticfiles/favicon.ico;
        expires 7d;
        access_log off;
        log_not_found off;
    }

    # ── Django (Gunicorn через Unix socket) ───────────────────────────────────
    location / {
        proxy_pass         http://unix:/run/tvoysad.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
