# =============================================================================
# /etc/nginx/sites-available/tvoysad
# Скопируйте на сервер и замените /opt/tvoysad на реальный путь к проекту.
#
# Активация:
#   sudo ln -sf /etc/nginx/sites-available/tvoysad /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ── Gzip (если ещё нет в /etc/nginx/nginx.conf в блоке http {}) ─────────────
# gzip on;
# gzip_vary on;
# gzip_proxied any;
# gzip_comp_level 6;
# gzip_min_length 1024;
# gzip_types
#     text/plain text/css text/javascript text/xml
#     application/javascript application/json application/xml
#     image/svg+xml font/woff font/woff2;

server {
    listen 80;
    server_name tlpn.shop www.tlpn.shop;

    # Редирект на HTTPS (раскомментируйте после настройки certbot)
    # return 301 https://$host$request_uri;

    client_max_body_size 20M;

    # ── Статика Django (CSS, JS, шрифты) ──────────────────────────────────────
    # collectstatic генерирует файлы без хеша, поэтому expires 30d.
    # Если добавить ManifestStaticFilesStorage — можно поднять до 1y + immutable.
    location /static/ {
        alias /opt/tvoysad/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ── Медиафайлы (загруженные пользователями / через admin) ─────────────────
    location /media/ {
        alias /opt/tvoysad/media/;
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Favicon ───────────────────────────────────────────────────────────────
    location = /favicon.ico {
        root /opt/tvoysad/staticfiles/;
        expires 7d;
        access_log off;
        log_not_found off;
    }

    # ── Django (Gunicorn через Unix socket) ───────────────────────────────────
    location / {
        proxy_pass         http://unix:/run/tvoysad.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;

        # HTML не кешируется браузером
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

# ── HTTPS (заполняется certbot автоматически) ──────────────────────────────
